name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: boss-task-tracker/package-lock.json
      - run: npm ci
        working-directory: boss-task-tracker
      - run: npm run build
        working-directory: boss-task-tracker
      - run: npm test
        working-directory: boss-task-tracker
